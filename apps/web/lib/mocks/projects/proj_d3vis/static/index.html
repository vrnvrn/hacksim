<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tree of Skill</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      { "imports": { "d3": "https://esm.sh/d3@7" } }
    </script>
  </head>
  <body>
    <header>
      <h1>Tree of Skill</h1>
      <p>Click a node to see the builder. Drag to rearrange. Hover to highlight a cluster.</p>
    </header>
    <main>
      <svg id="graph" width="100%" height="600" role="img" aria-label="Force-directed graph of builders coloured by skill cluster"></svg>
    </main>
    <footer>
      <span id="count"></span>
    </footer>
    <script type="module" src="data.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
