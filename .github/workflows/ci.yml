name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-lock.txt
          .venv/bin/pip install -e . --no-deps

      - name: Ruff
        run: .venv/bin/python -m ruff check packages/ tests/

      - name: Pytest (unit + component)
        # Skip the integration tests here: they boot two real AXL Go
        # binaries and live in a separate job.
        run: .venv/bin/python -m pytest packages/ -q

  integration:
    name: Python integration (real AXL nodes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build AXL binary
        run: bash scripts/build_axl.sh

      - name: Install Python deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-lock.txt
          .venv/bin/pip install -e . --no-deps

      - name: Pytest (integration)
        run: .venv/bin/python -m pytest tests/integration/ -q

  web:
    name: Web (vitest + tsc + eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"
          run_install: false

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: pnpm lint

      - name: Vitest
        run: pnpm vitest --run
